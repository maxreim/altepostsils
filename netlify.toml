[build]
  publish = "."
  [build.environment]
    NODE_VERSION = "24"

[[headers]]
  # Setzen sicherer Header für alle Pfade
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Link = "</images/sils.webp>; rel=preload; as=image; fetchpriority=high, <https://fonts.gstatic.com/s/lora/v35/0QI6MX1D_JOuMw_LIUC7C9_u9nVTxp3e86XG8Yv_p_7K.woff2>; rel=preload; as=font; type=font/woff2; crossorigin, <https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfMZhrib2Bg-4.woff2>; rel=preload; as=font; type=font/woff2; crossorigin"

[[headers]]
  # Keine Cache-Zwischenspeicherung für HTML (immer revalidieren)
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Langes Caching für CSS
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Langes Caching für JS
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Langes Caching für Bilder
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
